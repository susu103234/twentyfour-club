name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            bundle_glob: src-tauri/target/release/bundle/dmg/*.dmg
            artifact_name: 24club-macos
          - os: windows-latest
            bundle_glob: src-tauri/target/release/bundle/msi/*.msi
            artifact_name: 24club-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build bundle
        run: npm run tauri:build

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist-release
          cp ${{ matrix.bundle_glob }} dist-release/ 2>/dev/null || true
          ls -la dist-release

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
          draft: true
          generate_release_notes: true
          body: |
            Unsigned builds — not code-signed.

            **macOS**: after installing, run the following so Gatekeeper lets it open:

            ```
            xattr -cr /Applications/24club.app
            ```

            **Windows**: SmartScreen may warn on first run — click "More info" → "Run anyway".

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist-release/
